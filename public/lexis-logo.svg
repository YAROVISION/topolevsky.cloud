<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A6BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C2A8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A6BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C2A8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" fill="#0A0E1A" rx="16"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#4A90D9" stroke-width="0.5">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="80" y1="0" x2="80" y2="160"/>
    <line x1="160" y1="0" x2="160" y2="160"/>
    <line x1="240" y1="0" x2="240" y2="160"/>
    <line x1="320" y1="0" x2="320" y2="160"/>
    <line x1="400" y1="0" x2="400" y2="160"/>
  </g>

  <!-- === ICON: Logic graph / text analysis symbol === -->
  <!-- Connection lines (drawn first, behind nodes) -->
  <g filter="url(#glow)" opacity="0.7">
    <!-- Root to mid-left -->
    <line x1="62" y1="80" x2="38" y2="56" stroke="url(#accentGrad)" stroke-width="1.5"/>
    <!-- Root to mid-right -->
    <line x1="62" y1="80" x2="88" y2="56" stroke="url(#accentGrad)" stroke-width="1.5"/>
    <!-- Root to bottom -->
    <line x1="62" y1="80" x2="62" y2="108" stroke="url(#accentGrad)" stroke-width="1.5"/>
    <!-- Mid-left to leaf -->
    <line x1="38" y1="56" x2="24" y2="36" stroke="#1A6BFF" stroke-width="1.2" opacity="0.6"/>
    <line x1="38" y1="56" x2="48" y2="34" stroke="#1A6BFF" stroke-width="1.2" opacity="0.6"/>
    <!-- Mid-right to leaf -->
    <line x1="88" y1="56" x2="78" y2="34" stroke="#00C2A8" stroke-width="1.2" opacity="0.6"/>
    <line x1="88" y1="56" x2="100" y2="36" stroke="#00C2A8" stroke-width="1.2" opacity="0.6"/>
    <!-- Bottom to leaves -->
    <line x1="62" y1="108" x2="46" y2="128" stroke="#1A6BFF" stroke-width="1.2" opacity="0.6"/>
    <line x1="62" y1="108" x2="78" y2="128" stroke="#00C2A8" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- Leaf nodes -->
  <g filter="url(#glow)">
    <circle cx="24" cy="36" r="4" fill="none" stroke="#1A6BFF" stroke-width="1.5" opacity="0.7"/>
    <circle cx="48" cy="34" r="4" fill="none" stroke="#1A6BFF" stroke-width="1.5" opacity="0.7"/>
    <circle cx="78" cy="34" r="4" fill="none" stroke="#00C2A8" stroke-width="1.5" opacity="0.7"/>
    <circle cx="100" cy="36" r="4" fill="none" stroke="#00C2A8" stroke-width="1.5" opacity="0.7"/>
    <circle cx="46" cy="128" r="4" fill="none" stroke="#1A6BFF" stroke-width="1.5" opacity="0.7"/>
    <circle cx="78" cy="128" r="4" fill="none" stroke="#00C2A8" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Mid nodes -->
  <g filter="url(#glow)">
    <circle cx="38" cy="56" r="6" fill="#0A0E1A" stroke="#1A6BFF" stroke-width="2"/>
    <circle cx="88" cy="56" r="6" fill="#0A0E1A" stroke="#00C2A8" stroke-width="2"/>
    <circle cx="62" cy="108" r="6" fill="#0A0E1A" stroke="url(#accentGrad)" stroke-width="2"/>
  </g>

  <!-- Root node -->
  <circle cx="62" cy="80" r="10" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="62" cy="80" r="10" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Small "L" letter in root node as text symbol -->
  <text x="62" y="84.5" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="white">λ</text>

  <!-- === WORDMARK: LEXIS === -->
  <text x="138" y="100"
    font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
    font-size="58"
    font-weight="700"
    letter-spacing="-1"
    fill="white">LEXIS</text>

  <!-- Gradient underline accent -->
  <rect x="138" y="108" width="260" height="2.5" rx="1.25" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Tagline -->
  <text x="138" y="130"
    font-family="'Courier New', Courier, monospace"
    font-size="11"
    letter-spacing="3.5"
    fill="#4A90D9"
    opacity="0.8">LOGICAL TEXT ANALYSIS</text>
</svg>
