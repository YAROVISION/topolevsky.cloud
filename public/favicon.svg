<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A6BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C2A8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lineGradL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A6BFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6BFF;stop-opacity:0.5" />
    </linearGradient>
    <linearGradient id="lineGradR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00C2A8;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#00C2A8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="32" height="32" fill="#0A0E1A" rx="7"/>

  <!-- Subtle grid -->
  <g opacity="0.07" stroke="#4A90D9" stroke-width="0.4">
    <line x1="0" y1="10.6" x2="32" y2="10.6"/>
    <line x1="0" y1="21.3" x2="32" y2="21.3"/>
    <line x1="10.6" y1="0" x2="10.6" y2="32"/>
    <line x1="21.3" y1="0" x2="21.3" y2="32"/>
  </g>

  <!-- === Graph tree, centered in 32x32 === -->
  <!-- Root node is at (16, 16) -->

  <!-- Lines: root → mid-left (10, 11) -->
  <line x1="16" y1="16" x2="10" y2="11" stroke="#1A6BFF" stroke-width="1.3" opacity="0.8"/>
  <!-- Lines: root → mid-right (22, 11) -->
  <line x1="16" y1="16" x2="22" y2="11" stroke="#00C2A8" stroke-width="1.3" opacity="0.8"/>
  <!-- Lines: root → bottom (16, 23) -->
  <line x1="16" y1="16" x2="16" y2="23" stroke="url(#nodeGrad)" stroke-width="1.3" opacity="0.8"/>

  <!-- Leaf lines: mid-left → (6,6) and (13,6) -->
  <line x1="10" y1="11" x2="6" y2="6" stroke="#1A6BFF" stroke-width="1" opacity="0.55"/>
  <line x1="10" y1="11" x2="13" y2="6" stroke="#1A6BFF" stroke-width="1" opacity="0.55"/>
  <!-- Leaf lines: mid-right → (19,6) and (26,6) -->
  <line x1="22" y1="11" x2="19" y2="6" stroke="#00C2A8" stroke-width="1" opacity="0.55"/>
  <line x1="22" y1="11" x2="26" y2="6" stroke="#00C2A8" stroke-width="1" opacity="0.55"/>
  <!-- Leaf lines: bottom → (11,28) and (21,28) -->
  <line x1="16" y1="23" x2="11" y2="28" stroke="#1A6BFF" stroke-width="1" opacity="0.55"/>
  <line x1="16" y1="23" x2="21" y2="28" stroke="#00C2A8" stroke-width="1" opacity="0.55"/>

  <!-- Leaf nodes -->
  <g filter="url(#glow)">
    <circle cx="6"  cy="6"  r="1.8" fill="none" stroke="#1A6BFF" stroke-width="1.2" opacity="0.75"/>
    <circle cx="13" cy="6"  r="1.8" fill="none" stroke="#1A6BFF" stroke-width="1.2" opacity="0.75"/>
    <circle cx="19" cy="6"  r="1.8" fill="none" stroke="#00C2A8" stroke-width="1.2" opacity="0.75"/>
    <circle cx="26" cy="6"  r="1.8" fill="none" stroke="#00C2A8" stroke-width="1.2" opacity="0.75"/>
    <circle cx="11" cy="28" r="1.8" fill="none" stroke="#1A6BFF" stroke-width="1.2" opacity="0.75"/>
    <circle cx="21" cy="28" r="1.8" fill="none" stroke="#00C2A8" stroke-width="1.2" opacity="0.75"/>
  </g>

  <!-- Mid nodes -->
  <g filter="url(#glow)">
    <circle cx="10" cy="11" r="2.8" fill="#0A0E1A" stroke="#1A6BFF" stroke-width="1.4"/>
    <circle cx="22" cy="11" r="2.8" fill="#0A0E1A" stroke="#00C2A8" stroke-width="1.4"/>
    <circle cx="16" cy="23" r="2.8" fill="#0A0E1A" stroke="url(#nodeGrad)" stroke-width="1.4"/>
  </g>

  <!-- Root node with λ -->
  <circle cx="16" cy="16" r="5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="5" fill="none" stroke="white" stroke-width="0.6" opacity="0.25"/>
  <text x="16" y="18.5" text-anchor="middle"
    font-family="Georgia, serif"
    font-size="6"
    font-weight="bold"
    fill="white">λ</text>
</svg>
